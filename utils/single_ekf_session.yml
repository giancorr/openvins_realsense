session_name: vio_single_ekf_stack
options:
  mouse: 'on'

shell_command_before:
  - source /root/ros2_ws/install/setup.bash

windows:
  - window_name: algorithms
    layout: tiled
    panes:
      # Riquadro 1: OpenVINS (tenterà di avviare entrambe, ma solo cam0 riceverà frame)
      - shell_command:
          - sleep 3 # Aspetta che le telecamere si accendano
          - ros2 launch openvins_bringup launch_openvins_dual.launch.py
      
      # Riquadro 2: RViz2
      - shell_command:
          - sleep 5 # Aspetta che l'algoritmo sia partito
          - ros2 run rviz2 rviz2 -d $(ros2 pkg prefix openvins_bringup)/share/openvins_bringup/config/single.rviz
          
      # Riquadro 3: Odom to Baselink converter + EKF
      - shell_command:
          - sleep 6 # Aspetta l'avvio di OpenVINS
          - ros2 run odometry_tracker odom_to_baselink & ros2 run robot_localization ekf_node --ros-args --params-file $(ros2 pkg prefix openvins_bringup)/share/openvins_bringup/config/ekf.yaml
          
      # Riquadro 4: Path Publisher (base_link fusa) - C++
      - shell_command:
          - sleep 8 # Aspetta l'avvio dell'EKF
          - ros2 run odometry_tracker base_link_path_pub

  - window_name: drivers
    layout: tiled
    panes:
      # Riquadro 1: Telecamera 1 (cam0) - con IMU
      - shell_command:
          - ros2 launch realsense2_camera rs_launch.py camera_name:=cam0 enable_fisheye1:=true enable_fisheye2:=true enable_pose:=false enable_gyro:=true enable_accel:=true unite_imu_method:="2" publish_tf:=false tf_publish_rate:=0.0
      
      # Riquadro 2: TF Tree (global=ENU, global_ned=NED, base_link=NED fusa)
      - shell_command:
          - ros2 run tf2_ros static_transform_publisher 0 0 0 1 0 0 0 global global_ned & ros2 run tf2_ros static_transform_publisher 0 0 -0.14 0.5 0.5 0.5 0.5 base_link cam0_link
      
      # Riquadro 3: Terminale vuoto per debug
      - shell_command:
          - clear
