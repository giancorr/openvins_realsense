session_name: vio_stack
options:
  mouse: 'on'

shell_command_before:
  - source /root/ros2_ws/install/setup.bash

windows:
  - window_name: algorithms
    layout: tiled
    panes:
      # --- [Pane 1] OpenVINS VIO (Algorithm) ---
      - shell_command:
          - sleep 3
          - ros2 launch openvins_bringup launch_openvins.launch.py

      # --- [Pane 2] RViz2 Visualization ---
      - shell_command:
          - sleep 5
          - ros2 run rviz2 rviz2 -d $(ros2 pkg prefix openvins_bringup)/share/openvins_bringup/config/single.rviz

      # --- [Pane 3] Odometry & Path Publisher (C++) ---
      - shell_command:
          - sleep 6
          - ros2 run odometry_tracker base_link_path_pub

      # --- [Pane 4] Debug Terminal ---
      - shell_command:
          - clear

  - window_name: drivers
    layout: tiled
    panes:
      # --- [Pane 1] Front Camera Driver (cam0) ---
      - shell_command:
          - ros2 launch realsense2_camera rs_launch.py camera_name:=cam0 enable_fisheye1:=true enable_fisheye2:=true enable_pose:=false enable_gyro:=true enable_accel:=true unite_imu_method:="2"

      # --- [Pane 2] Debug Terminal ---
      - shell_command:
          - clear

      # --- [Pane 3] Static TF Tree ---
      - shell_command:
          - ros2 run tf2_ros static_transform_publisher 0 -0.15 -0.13 0.5 0.5 0.5 -0.5 imu base_link & ros2 run tf2_ros static_transform_publisher 0.13 0 0.15 0.5 0.5 0.5 0.5 base_link cam0_link & ros2 run tf2_ros static_transform_publisher -0.15 0 0.19 -0.35355339 0.35355339 0.61237244 -0.61237244 base_link cam1_link
