# cam1's fisheye1 relative to cam1's OWN IMU.
# Since both T265s are the same model, the internal geometry
# (fisheye ↔ IMU) is nearly identical. We use cam0's T_cam_imu
# as approximation and let OpenVINS refine it online.
# Intrinsics and distortion are cam1's own factory calibration.

cam0:
  T_cam_imu:
    - [-0.9999280587090406, 0.0023419948248876044, 0.011764032752834669, 0.010696921966315498]
    - [-0.0022814263595560148, -0.999984087726172, 0.005159398048389645, 0.00004881900621520546]
    - [0.011775928843853046, 0.0051321881002164725, 0.9999174906686895, -0.00025198669457424566]
    - [0.0, 0.0, 0.0, 1.0]
  cam_overlaps: []
  camera_model: pinhole
  distortion_coeffs: [-0.008605508133769035, 0.04601328819990158, -0.04324154928326607, 0.007965809665620327]
  distortion_model: equidistant
  intrinsics: [285.74029541015625, 285.93780517578125, 419.5581970214844, 397.5570983886719]
  resolution: [848, 800]
  rostopic: /t265/fisheye1/image_raw
  timeshift_cam_imu: 0.005583860066266795


